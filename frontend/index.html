<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUCSGenAI Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d631b",
                        "primary-container": "#2e7d32",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#cbffc2",
                        "secondary": "#556158",
                        "secondary-container": "#d9e6da",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#5b675e",
                        "tertiary": "#0054a7",
                        "tertiary-container": "#246dc8",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#edf1ff",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "background": "#fbf9f9",
                        "on-background": "#1b1c1c",
                        "surface": "#fbf9f9",
                        "on-surface": "#1b1c1c",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f5f3f3",
                        "surface-container": "#efeded",
                        "surface-container-high": "#e9e8e7",
                        "surface-container-highest": "#e3e2e2",
                        "on-surface-variant": "#40493d",
                        "outline": "#707a6c",
                        "outline-variant": "#bfcaba"
                    },
                    borderRadius: {
                        DEFAULT: "0.125rem",
                        lg: "0.25rem",
                        xl: "0.5rem",
                        full: "0.75rem"
                    },
                    spacing: {
                        base: "4px",
                        gutter: "24px",
                        xs: "4px",
                        "2xl": "48px",
                        md: "16px",
                        xl: "32px",
                        "margin-desktop": "40px",
                        lg: "24px",
                        "margin-mobile": "16px",
                        sm: "8px"
                    },
                    fontSize: {
                        "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "0", fontWeight: "700" }],
                        "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "0", fontWeight: "600" }],
                        "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
                        "title-lg": ["20px", { lineHeight: "28px", fontWeight: "500" }],
                        "label-md": ["12px", { lineHeight: "16px", letterSpacing: "0", fontWeight: "600" }],
                        "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --theme-primary: #0d631b;
            --theme-primary-soft: #d9e6da;
            --theme-primary-faint: #e2f8e2;
            --theme-primary-border: #d5ecd5;
            --heatmap-low: #dde8dd;
            --heatmap-mid: #7daa84;
            --heatmap-high: #0d631b;
        }
        body[data-theme="ocean"] {
            --theme-primary: #0054a7;
            --theme-primary-soft: #d9e8f8;
            --theme-primary-faint: #e5f1fb;
            --theme-primary-border: #c5dced;
            --heatmap-low: #e1edf6;
            --heatmap-mid: #79a8cf;
            --heatmap-high: #0054a7;
        }
        body[data-theme="graphite"] {
            --theme-primary: #343a40;
            --theme-primary-soft: #e2e4e6;
            --theme-primary-faint: #eef0f1;
            --theme-primary-border: #d4d7da;
            --heatmap-low: #e5e7e9;
            --heatmap-mid: #9099a1;
            --heatmap-high: #343a40;
        }
        body { background-color: #fbf9f9; color: #1b1c1c; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-panel {
            background: #fffdfd;
            border: 1px solid #bfcaba;
            box-shadow: 0 8px 18px rgba(13, 99, 27, 0.06);
        }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 24px;
        }
        .page-content { display: none; }
        .page-content.active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chart-container { position: relative; height: 300px; }
        .chart-container-lg { position: relative; height: 420px; }
        .nav-link.active {
            background: #d9e6da;
            color: #0d631b;
        }
        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
        }
        .page-header-copy {
            flex: 1 1 260px;
            min-width: 220px;
        }
        .page-header-controls {
            flex: 0 1 auto;
            min-width: 0;
            margin-left: auto;
        }
        .page-header-actions {
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 8px;
        }
        .filter-group {
            display: inline-flex;
            align-items: center;
            border: 1px solid #bfcaba;
            border-radius: 4px;
            overflow: hidden;
            background: #fbf9f9;
        }
        .filter-tab {
            min-width: 82px;
            padding: 8px 18px;
            font-size: 12px;
            line-height: 16px;
            font-weight: 700;
            color: #40493d;
            text-align: center;
            cursor: pointer;
            border: 0;
            background: transparent;
        }
        .filter-tab.active {
            background: #ffffff;
            color: #0d631b;
            box-shadow: inset 0 0 0 1px #d9e6da;
        }
        .data-table th {
            background: #f7f5f5;
            color: #40493d;
            font-size: 12px;
            font-weight: 700;
            text-transform: none;
            letter-spacing: 0;
        }
        .data-table td, .data-table th {
            border-bottom: 1px solid #bfcaba;
            padding: 16px 24px;
        }
        .tag-pill {
            display: inline-flex;
            align-items: center;
            border: 1px solid #bfcaba;
            border-radius: 12px;
            background: #efeded;
            color: #1b1c1c;
            font-weight: 600;
            line-height: 1;
        }
        .tag-pill.featured {
            background: #d9e6da;
            border-color: #7dd77a;
            color: #0d631b;
        }
        .filter-select {
            min-width: 160px;
            border: 1px solid #bfcaba;
            border-radius: 4px;
            background: #fffdfd;
            color: #1b1c1c;
            padding: 8px 12px;
            font-size: 12px;
            line-height: 16px;
            font-weight: 700;
        }
        .filter-toolbar {
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 8px;
        }
        .filter-dropdown {
            position: relative;
        }
        .filter-trigger {
            min-height: 38px;
            max-width: 260px;
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            border: 1px solid #bfcaba;
            border-radius: 4px;
            background: #fffdfd;
            color: #1b1c1c;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 700;
        }
        .filter-trigger .filter-summary {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .filter-popover {
            position: absolute;
            z-index: 80;
            top: calc(100% + 8px);
            right: 0;
            width: min(640px, calc(100vw - 32px));
            max-height: 440px;
            overflow: auto;
            border: 1px solid #bfcaba;
            border-radius: 6px;
            background: #fffdfd;
            box-shadow: 0 18px 42px rgba(27, 28, 28, 0.16);
            padding: 16px;
        }
        .filter-popover[hidden] { display: none; }
        .hierarchy-columns {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }
        .check-list {
            display: grid;
            gap: 6px;
            align-content: start;
        }
        .check-option {
            display: grid;
            grid-template-columns: 18px minmax(0, 1fr);
            align-items: start;
            gap: 8px;
            padding: 7px 8px;
            border-radius: 4px;
            color: #40493d;
            cursor: pointer;
        }
        .check-option:hover { background: #f0f4f0; }
        .check-option input {
            width: 16px;
            height: 16px;
            margin-top: 1px;
            border-radius: 3px;
            color: #0d631b;
        }
        .date-filter {
            display: flex;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 8px;
        }
        .compact-select {
            min-width: 108px;
            min-height: 38px;
        }
        .date-range-input {
            width: 160px;
            min-height: 38px;
            cursor: pointer;
        }
        .filter-select.date-range-input.flatpickr-input {
            width: 160px !important;
            min-width: 160px !important;
            height: 38px !important;
            min-height: 38px !important;
            border: 1px solid #bfcaba !important;
            border-radius: 4px !important;
            background: #fffdfd !important;
            color: #1b1c1c !important;
            padding: 8px 12px !important;
            font-family: Inter, sans-serif !important;
            font-size: 12px !important;
            font-weight: 700 !important;
            line-height: 16px !important;
            box-shadow: none !important;
        }
        .filter-select.date-range-input.flatpickr-input::placeholder {
            color: #1b1c1c;
            opacity: 1;
        }
        .filter-select.date-range-input.flatpickr-input:focus {
            border-color: var(--theme-primary) !important;
            box-shadow: 0 0 0 1px var(--theme-primary) !important;
            outline: none;
        }
        .control-label {
            display: grid;
            gap: 4px;
            color: #40493d;
            font-size: 12px;
            font-weight: 600;
        }
        .icon-button {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #bfcaba;
            border-radius: 4px;
            color: #0d631b;
            background: #fffdfd;
        }
        .sync-readiness,
        .run-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            width: fit-content;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 700;
            text-transform: capitalize;
        }
        .sync-readiness.ready,
        .run-status.success {
            background: var(--theme-primary-faint);
            color: var(--theme-primary);
        }
        .sync-readiness.blocked,
        .run-status.failed {
            background: #ffdad6;
            color: #ba1a1a;
        }
        .run-status.running {
            background: #e5f1fb;
            color: #0054a7;
        }
        .connection-status {
            min-width: 0;
            border: 1px solid #bfcaba;
            border-left-width: 3px;
            border-radius: 4px;
            padding: 12px;
            background: #fffdfd;
        }
        .connection-status.ready {
            border-left-color: var(--theme-primary);
        }
        .connection-status.ready > div:first-child > .material-symbols-outlined,
        .connection-status.ready > .font-label-md {
            color: var(--theme-primary);
        }
        .connection-status.blocked {
            border-left-color: #ba1a1a;
        }
        .connection-status.blocked > div:first-child > .material-symbols-outlined,
        .connection-status.blocked > .font-label-md {
            color: #ba1a1a;
        }
        .legend-button {
            width: 100%;
            display: grid;
            grid-template-columns: 12px minmax(0, 1fr) auto;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 4px;
            text-align: left;
        }
        .legend-button:hover {
            background: #f0f4f0;
        }
        .settings-band {
            border-top: 1px solid #bfcaba;
            padding: 24px 0;
        }
        .settings-band:first-child {
            border-top: 0;
            padding-top: 0;
        }
        .theme-swatch {
            width: 40px;
            height: 40px;
            border: 2px solid #ffffff;
            border-radius: 6px;
            box-shadow: 0 0 0 1px #bfcaba;
        }
        .theme-swatch.active {
            box-shadow: 0 0 0 3px #1b1c1c;
        }
        .year-popover {
            width: 240px;
        }
        body.compact-tables .data-table td,
        body.compact-tables .data-table th {
            padding-top: 8px;
            padding-bottom: 8px;
        }
        body[data-theme="ocean"] .text-primary { color: #0054a7 !important; }
        body[data-theme="ocean"] .bg-primary { background-color: #0054a7 !important; }
        body[data-theme="ocean"] .bg-secondary-container { background-color: #d9e8f8 !important; }
        body[data-theme="ocean"] .nav-link.active { background: #d9e8f8; color: #0054a7; }
        body[data-theme="graphite"] .text-primary { color: #343a40 !important; }
        body[data-theme="graphite"] .bg-primary { background-color: #343a40 !important; }
        body[data-theme="graphite"] .bg-secondary-container { background-color: #e2e4e6 !important; }
        body[data-theme="graphite"] .nav-link.active { background: #e2e4e6; color: #343a40; }
        .theme-accent-panel {
            background: var(--theme-primary-faint);
            border-color: var(--theme-primary-border);
        }
        .theme-accent-value {
            color: var(--theme-primary);
        }
        .heatmap-legend {
            background: linear-gradient(to right, var(--heatmap-low), var(--heatmap-mid), var(--heatmap-high));
        }
        .pagination-btn {
            min-width: 32px;
            height: 32px;
            padding: 0 10px;
            border-radius: 8px;
            color: #1b1c1c;
        }
        .pagination-btn.active {
            background: #1b1c1c;
            color: #fffdfd;
        }
        .pagination-btn:disabled {
            color: #9da79d;
            cursor: not-allowed;
        }
        .api-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .api-status.connected { background: #d9e6da; color: #0d631b; }
        .api-status.disconnected { background: #ffdad6; color: #ba1a1a; }
        .api-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .api-status.connected .api-status-dot { background: #0d631b; }
        .api-status.disconnected .api-status-dot { background: #ba1a1a; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @media (max-width: 1180px) {
            .page-header {
                align-items: flex-start;
                flex-direction: column;
            }
            .page-header-controls,
            .page-header-actions {
                width: 100%;
                margin-left: 0;
            }
            .page-header-actions,
            .page-header-controls .filter-toolbar {
                justify-content: flex-start;
            }
        }
        @media (max-width: 768px) {
            body > nav {
                width: 72px !important;
                padding: 12px 8px !important;
            }
            body > nav > div:first-child {
                justify-content: center;
                margin-bottom: 24px !important;
            }
            body > nav > div:first-child > div:last-child,
            body > nav .nav-link:not(.material-symbols-outlined) {
                overflow: hidden;
            }
            body > nav > div:first-child > div:last-child {
                display: none;
            }
            body > nav a {
                justify-content: center;
                gap: 0;
                font-size: 0 !important;
                padding-left: 8px !important;
                padding-right: 8px !important;
            }
            body > nav a .material-symbols-outlined {
                font-size: 22px !important;
            }
            body > div.flex-1 {
                flex: none;
                width: calc(100% - 72px);
                margin-left: 72px;
            }
            body > div.flex-1 > header {
                height: 56px;
                padding-left: 16px;
                padding-right: 16px;
            }
            #page-container {
                padding: 16px;
            }
            .page-header {
                gap: 12px;
            }
            .page-header-copy {
                flex-basis: auto;
                min-width: 0;
            }
            .page-header-actions {
                align-items: stretch;
            }
            #page-container > .flex.justify-between,
            #page-container > .flex.justify-between > .flex {
                align-items: flex-start;
                flex-direction: column !important;
                flex-wrap: wrap;
                gap: 12px;
            }
            .filter-group {
                max-width: 100%;
                overflow-x: auto;
            }
            .filter-toolbar,
            .date-filter {
                width: 100%;
                justify-content: flex-start;
            }
            .filter-dropdown,
            .filter-trigger,
            .control-label {
                max-width: 100%;
            }
            .filter-trigger {
                width: 100%;
            }
            .filter-popover {
                position: fixed;
                top: 72px;
                right: 16px;
                left: 88px;
                width: auto;
                max-height: calc(100vh - 96px);
            }
            .hierarchy-columns {
                grid-template-columns: minmax(0, 1fr);
            }
            .consumption-chart-layout,
            .settings-layout {
                grid-template-columns: minmax(0, 1fr) !important;
            }
            .consumption-metrics {
                grid-template-rows: auto !important;
                min-height: 0 !important;
            }
            .schedule-fields {
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
            }
            .schedule-counts {
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
            }
            .connection-grid {
                grid-template-columns: minmax(0, 1fr) !important;
            }
            .date-range-input {
                width: 100%;
            }
            .filter-select.date-range-input.flatpickr-input {
                width: 100% !important;
                min-width: 0 !important;
            }
            .filter-tab {
                min-width: 68px;
                padding-left: 12px;
                padding-right: 12px;
            }
            .bento-grid {
                grid-template-columns: minmax(0, 1fr) !important;
                gap: 16px;
            }
            .bento-grid > [class*="col-span-"] {
                grid-column: 1 / -1 !important;
                min-width: 0;
            }
            .bento-grid > .grid,
            .bento-grid .grid:has(.chart-container-lg) {
                grid-template-columns: minmax(0, 1fr) !important;
            }
            #page-container .bento-grid > .grid.grid-cols-2 {
                grid-template-columns: minmax(0, 1fr) !important;
            }
            #page-container .bento-grid > .grid > [class*="col-span-"] {
                grid-column: 1 / -1 !important;
            }
            #page-container .grid-cols-4 {
                grid-template-columns: minmax(0, 1fr) !important;
            }
            .chart-container-lg {
                height: 320px;
            }
            .data-table td,
            .data-table th {
                padding: 12px 16px;
                white-space: nowrap;
            }
            .api-status {
                right: 12px;
                bottom: 12px;
            }
        }
        @media (max-width: 480px) {
            .schedule-fields,
            .schedule-counts {
                grid-template-columns: minmax(0, 1fr) !important;
            }
        }
    </style>
</head>

            </a></li>
            <li><a href="#/behavior" class="nav-link flex items-center gap-md px-md py-sm text-on-surface-variant hover:bg-surface-container-high transition-colors rounded cursor-pointer font-label-md text-label-md">
                <span class="material-symbols-outlined">person_search</span> User Behavior

                <span class="material-symbols-outlined">settings</span> Settings

        </ul>
        <div class="mt-auto border-t border-outline-variant pt-md">
            <ul class="flex flex-col gap-xs">
